<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente de Soporte — tuterapia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:       #75B781;
    --green-dark:  #264534;
    --green-mid:   #5A7968;
    --green-light: #e8f5ea;
    --teal:        #007271;
    --navy:        #213E6E;
    --cream:       #FEFAF5;
    --yellow:      #FCD07F;
    --salmon:      #F29683;
    --taupe:       #938f80;
    --text:        #264534;
    --text-2:      #5A7968;
    --text-3:      #938f80;
    --bg:          #FEFAF5;
    --bg-card:     #ffffff;
    --border:      rgba(38,69,52,0.10);
    --border-2:    rgba(38,69,52,0.18);
    --radius:      14px;
    --radius-sm:   9px;
  }

  html, body {
    height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body { display: flex; flex-direction: column; min-height: 100vh; }

  /* TOP BAR */
  .topbar {
    background: var(--green-dark);
    padding: 0 32px;
    height: 62px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .topbar img {
    height: 36px;
    object-fit: contain;
    mix-blend-mode: screen;
  }

  .topbar-sep {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.2);
  }

  .topbar-label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.03em;
  }

  .topbar-badge {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--green);
    color: var(--green-dark);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    max-width: 1080px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 20px;
    gap: 20px;
  }

  /* SIDEBAR */
  .sidebar {
    width: 255px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .sidebar-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
  }

  .sidebar-header span {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--green-mid);
  }

  .faq-count {
    font-size: 11px;
    font-weight: 700;
    background: var(--green-dark);
    color: #fff;
    padding: 2px 9px;
    border-radius: 20px;
  }

  .faq-list { overflow-y: auto; max-height: 420px; }

  .faq-item {
    padding: 11px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
    transition: background 0.12s, color 0.12s;
    line-height: 1.4;
    position: relative;
  }

  .faq-item:last-child { border-bottom: none; }
  .faq-item:hover { background: var(--green-light); color: var(--green-dark); }

  .add-btn {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    color: var(--green-dark);
    cursor: pointer;
    border: none;
    background: none;
    text-align: left;
    border-top: 1px solid var(--border);
    width: 100%;
    transition: background 0.12s;
    font-family: 'Nunito', sans-serif;
    letter-spacing: 0.01em;
  }

  .add-btn:hover { background: var(--green-light); }

  /* CHAT */
  .chat-wrap {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .chat-top {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    background: var(--cream);
  }

  .bot-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .bot-icon svg { width: 18px; height: 18px; }

  .chat-top-text h3 { font-size: 14px; font-weight: 700; color: var(--text); }
  .chat-top-text p  { font-size: 12px; color: var(--text-3); margin-top: 1px; }

  .online {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--teal);
  }

  .online::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--teal);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
    background: var(--bg);
  }

  .welcome-msg {
    text-align: center;
    padding: 36px 20px;
  }

  .welcome-icon {
    width: 56px; height: 56px;
    background: var(--green-dark);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }

  .welcome-icon svg { width: 26px; height: 26px; }

  .welcome-msg h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 8px;
  }

  .welcome-msg p {
    font-size: 14px;
    color: var(--text-3);
    line-height: 1.65;
    max-width: 290px;
    margin: 0 auto;
  }

  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    max-width: 82%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { margin-left: auto; flex-direction: row-reverse; }

  .bubble {
    padding: 10px 15px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.55;
    border-radius: 16px;
  }

  .msg-row.bot  .bubble {
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-row.user .bubble {
    background: var(--green-dark);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-3);
    flex-shrink: 0;
    padding-bottom: 3px;
  }

  .typing-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    max-width: 82%;
  }

  .typing-dots {
    padding: 12px 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: dot-bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  .chips-area {
    padding: 10px 18px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }

  .chip {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border-2);
    font-size: 12px;
    font-weight: 600;
    font-family: 'Nunito', sans-serif;
    color: var(--text-2);
    cursor: pointer;
    background: none;
    transition: all 0.12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  .chip:hover {
    border-color: var(--green);
    color: var(--green-dark);
    background: var(--green-light);
  }

  .input-row {
    padding: 12px 16px 14px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }

  .input-row textarea {
    flex: 1;
    border: 1.5px solid var(--border-2);
    border-radius: 22px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Nunito', sans-serif;
    resize: none;
    outline: none;
    background: var(--cream);
    color: var(--text);
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.12s;
  }

  .input-row textarea:focus { border-color: var(--green); background: #fff; }
  .input-row textarea::placeholder { color: var(--text-3); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--green-dark);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.12s, transform 0.1s;
  }

  .send-btn:hover  { opacity: 0.85; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn svg    { width: 16px; height: 16px; fill: white; }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(33,62,110,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 28px;
    width: 430px;
    max-width: 92vw;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 24px 64px rgba(33,62,110,0.18);
    animation: modalIn 0.18s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--green-dark);
  }

  .modal label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    display: block;
    margin-bottom: 6px;
  }

  .modal input, .modal textarea {
    width: 100%;
    border: 1.5px solid var(--border-2);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--text);
    outline: none;
    transition: border-color 0.12s;
  }

  .modal input:focus, .modal textarea:focus {
    border-color: var(--green);
    background: #fff;
  }

  .modal textarea { resize: vertical; min-height: 90px; }

  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  .btn-cancel {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border-2);
    background: none;
    color: var(--text-2);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: background 0.12s;
  }

  .btn-cancel:hover { background: var(--cream); }

  .btn-save {
    padding: 9px 22px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--green-dark);
    color: white;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: opacity 0.12s;
  }

  .btn-save:hover { opacity: 0.85; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

  @media (max-width: 700px) {
    .layout { padding: 12px; gap: 12px; flex-direction: column; height: auto; }
    .sidebar { width: 100%; }
    .faq-list { max-height: 150px; }
    .chat-wrap { min-height: 480px; }
  }
</style>
</head>

    list.innerHTML = '';
    faqs.forEach(f => {
      const el = document.createElement('div');
      el.className = 'faq-item';
      el.textContent = f.q;
      el.onclick = () => askQuestion(f.q);
      list.appendChild(el);

    document.getElementById('faqCount').textContent = faqs.length;
    renderChips();

  function renderChips() {
    const area = document.getElementById('chips');

    primerChip.className = 'chip';

    primerChip.onclick = () => askQuestion('me llegó un potencial paciente qué hago');
    area.appendChild(primerChip);

    faqs.slice(0, 3).forEach(f => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = f.q.length > 42 ? f.q.slice(0, 40) + '…' : f.q;
      chip.onclick = () => askQuestion(f.q);
      area.appendChild(chip);
    });

  function findAnswer(query) {
    const q = query.toLowerCase().replace(/[¿?¡!]/g, '');

    // Detectar preguntas sobre primer paciente
    const primerPacienteKeys = ['primer paciente','llego un paciente','llegó un paciente','potencial paciente','me seleccionó','se seleccionó','no compró sesión','sin sesion','sin sesión','reservó hora','compró sesión','qué hago cuando','como contactar'];
    if (primerPacienteKeys.some(k => q.includes(k))) {
      return '__SPECIAL_PRIMER_PACIENTE__';
    }

    let best = null, bestScore = 0;

    faqs.forEach(f => {
      let score = 0;
      const fqWords = f.q.toLowerCase().replace(/[¿?¡!]/g, '').split(/\s+/);
      fqWords.forEach(w => { if (w.length > 3 && q.includes(w)) score += 2; });

      const intents = [
        { words: ['agendar','agenda','sesion','sesión','reservar','reserva'], boost: 3 },
        { words: ['credito','crédito','creditos','créditos','comprar','pago','pagar'], boost: 3 },
        { words: ['cancelar','cancelacion','cancelación'], boost: 3 },
        { words: ['reprogramar','cambiar','mover'], boost: 3 },
        { words: ['paciente','aparece','lista','encontrar'], boost: 3 },
        { words: ['historial','sesiones','anteriores'], boost: 3 },
        { words: ['horario','disponibilidad','turno'], boost: 3 },
        { words: ['comunicar','mensaje','chat','contactar'], boost: 3 },
      ];

      intents.forEach(intent => {
        const fHas = intent.words.some(w => f.q.toLowerCase().includes(w) || f.a.toLowerCase().includes(w));
        const qHas = intent.words.some(w => q.includes(w));
        if (fHas && qHas) score += intent.boost;
      });

      if (score > bestScore) { bestScore = score; best = f; }
    });

    if (bestScore >= 2) return best.a;
    return "No encontré una respuesta para esa consulta en la base de conocimiento. Podés agregarla usando el botón '＋ Agregar pregunta' del panel lateral.";
  }

  function askQuestion(text) {
    addMsg(text, true);
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMsg(findAnswer(text), false);
    }, 700 + Math.random() * 400);
  }

  function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = '';
    askQuestion(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function openModal() {
    document.getElementById('modalBg').classList.add('open');
    setTimeout(() => document.getElementById('newQ').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalBg').classList.remove('open');
    document.getElementById('newQ').value = '';
    document.getElementById('newA').value = '';
  }

  function bgClick(e) {
    if (e.target === document.getElementById('modalBg')) closeModal();
  }

  function saveFaq() {
    const q = document.getElementById('newQ').value.trim();
    const a = document.getElementById('newA').value.trim();
    if (!q || !a) {
      const field = q ? document.getElementById('newA') : document.getElementById('newQ');
      field.style.borderColor = '#F29683';
      setTimeout(() => { field.style.borderColor = ''; }, 1500);
      return;
    }
    faqs.unshift({ q, a });
    renderFaqs();
    closeModal();
  }

  renderFaqs();
</script>
</body>
</html>
